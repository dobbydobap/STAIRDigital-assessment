services:
  ui:
    build: .
    image: pdfagent:latest
    container_name: pdfagent-ui
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - PDFAGENT_DATA_DIR=/data
    volumes:
      - ./data:/data
    ports:
      - "8501:8501"
    command: streamlit run pdfagent/ui/streamlit_app.py --server.port=8501 --server.address=0.0.0.0

  api:
    image: pdfagent:latest
    container_name: pdfagent-api
    depends_on:
      - ui
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - PDFAGENT_DATA_DIR=/data
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    command: uvicorn pdfagent.api.app:app --host 0.0.0.0 --port 8000
